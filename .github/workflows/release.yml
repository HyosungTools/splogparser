
name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 8.0.21)'
        required: true

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          vs-version: '17.4'

      - name: Restore Dependencies
        run: cd src && nuget restore && cd ..

      - name: Update VersionInfo
        run: |
          $version = "${{ github.event.inputs.version }}"
          $content = "// Auto-generated version file`nnamespace SplogParser`n{`n    public static class VersionInfo`n    {`n        public const string Current = `"$version`";`n    }`n}"
          Set-Content -Path src\splogparser\VersionInfo.cs -Value $content
        shell: pwsh        
        
      - name: Make Dir
        run: mkdir dist

      - name: Build splogparser
        run: msbuild src\\splogparser.sln /m:1 /t:Clean,Build /p:Configuration="Release" /p:Platform="Any CPU" /nodeReuse:false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          
      - name: Build hylogparser
        run: dotnet publish src\hylogparser\hylogparser.csproj -c Release -o dist

      # Install Inno Setup
      - name: Install Inno Setup
        run: choco install innosetup --yes

      # Build installer
      - name: Build Installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ github.event.inputs.version }} installer\splogparser.iss'

      - name: Package Build Output
        run: Compress-Archive -Path dist\\* -Destination splogparser-${{ github.event.inputs.version }}.zip
        shell: pwsh
        
      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: splogparser v${{ github.event.inputs.version }}
          files: |
            splogparser-${{ github.event.inputs.version }}.zip
            installer/output/splogparser-setup-${{ github.event.inputs.version }}.exe
          prerelease: false
          make_latest: true
